services:
  - type: web
    name: jl-would-go
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: surfline-snapshots
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SURFLINE_SNAPSHOT_TOKEN
        sync: false
      - key: SURFLINE_SNAPSHOT_TTL_SEC
        value: 14400
