services:
  - type: web
    name: jl-would-go
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SURFLINE_SNAPSHOT_TOKEN
        sync: false
      - key: SURFLINE_SNAPSHOT_TTL_SEC
        value: 14400
